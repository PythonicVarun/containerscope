name: CI

on:
    push:
        branches:
            - "**"
        tags-ignore:
            - "v*.*.*"
    pull_request:
    workflow_dispatch:

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    go:
        name: Go Checks
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@v6

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod
                  cache: true

            - name: Download dependencies
              run: go mod download

            - name: Verify module downloads
              run: go mod verify

            - name: Check Go formatting
              run: |
                  unformatted="$(find . -name '*.go' -type f -print0 | xargs -0 gofmt -l)"
                  if [ -n "$unformatted" ]; then
                      echo "The following files need gofmt:"
                      echo "$unformatted"
                      exit 1
                  fi

            - name: Run tests
              run: go test ./...

            - name: Build binary
              run: go build -o /tmp/containerscope ./cmd/containerscope

    # Non-publishing Docker image build smoke test
    docker:
        name: Docker Build
        runs-on: ubuntu-latest
        needs: go

        steps:
            - name: Check out repository
              uses: actions/checkout@v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Build image
              uses: docker/build-push-action@v7
              with:
                  context: .
                  platforms: linux/amd64
                  push: false
                  tags: containerscope:ci
