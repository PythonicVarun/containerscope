services:
    containerscope:
        image: containerscope:local
        build:
            context: .
            dockerfile: Dockerfile
        container_name: containerscope
        restart: unless-stopped
        ports:
            - "4000:4000"
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
        environment:
            - CONTAINER_SCOPE_PORT=4000
